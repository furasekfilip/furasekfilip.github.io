<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kahoot Answer Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card { background: rgba(255, 255, 255, 0.95); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-3xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold text-white mb-2 flex items-center justify-center gap-3">
        <i class="fas fa-bolt text-yellow-300"></i>
        Kahoot Cheat
      </h1>
      <p class="text-white/80 text-lg">Enter Quiz UUID to reveal all answers</p>
    </div>

    <!-- Input Card -->
    <div class="card rounded-3xl shadow-2xl p-8 mb-6">
      <div class="flex gap-3">
        <input
          type="text"
          id="quizId"
          placeholder="Paste Quiz UUID here..."
          class="flex-1 px-6 py-4 text-lg border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500 transition"
        >
        <button
          onclick="fetchKahoot()"
          id="fetchBtn"
          class="px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-semibold rounded-2xl hover:scale-105 transition flex items-center gap-2"
        >
          <i class="fas fa-search"></i>
          Fetch
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-8 text-white">
      <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
      <p class="text-xl">Fetching quiz data...</p>
    </div>

    <!-- Results -->
    <div id="results" class="hidden">
      <div class="card rounded-3xl shadow-2xl p-8">
        <h2 id="quizTitle" class="text-3xl font-bold text-gray-800 mb-2"></h2>
        <p id="quizDescription" class="text-gray-600 mb-8"></p>
        <div id="questions" class="space-y-8"></div>
      </div>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-100 border border-red-400 text-red-700 px-6 py-4 rounded-2xl text-center">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorMsg" class="ml-2"></span>
    </div>
  </div>

  <script>
    async function fetchKahoot() {
      const quizId = document.getElementById('quizId').value.trim();
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const error = document.getElementById('error');

      if (!quizId) {
        showError("Please enter a Quiz UUID");
        return;
      }

      results.classList.add('hidden');
      error.classList.add('hidden');
      loading.classList.remove('hidden');

      try {
        const proxies = [
          "https://api.allorigins.win/raw?url=",
          "https://proxy.killcors.com/?url=",
          "https://cors.x2u.in/?url=",
          "https://corsproxy.org/?"
        ];

        let data = null;
        let success = false;

        for (const proxy of proxies) {
          try {
            const targetUrl = `https://create.kahoot.it/rest/kahoots/${quizId}`;
            const response = await fetch(proxy + encodeURIComponent(targetUrl));
            
            if (response.ok) {
              data = await response.json();
              success = true;
              break;
            }
          } catch (e) {
            continue;
          }
        }

        if (!success || !data) {
          throw new Error("All proxies failed");
        }

        displayQuiz(data);
      } catch (err) {
        console.error(err);
        showError("Could not fetch quiz. Make sure the UUID is correct and the quiz is public.");
      } finally {
        loading.classList.add('hidden');
      }
    }

    function displayQuiz(data) {
      document.getElementById('results').classList.remove('hidden');
      
      document.getElementById('quizTitle').textContent = data.title || "Untitled Quiz";
      document.getElementById('quizDescription').textContent = data.description || "";

      const questionsContainer = document.getElementById('questions');
      questionsContainer.innerHTML = '';

      data.questions.forEach((q, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = "border border-gray-200 rounded-2xl p-6 hover:border-purple-300 transition";

        let optionsHTML = q.choices.map((choice, i) => {
          const isCorrect = choice.correct === true;
          return `
            <div class="flex items-center gap-3 p-4 rounded-xl ${isCorrect ? 'bg-green-100 border-2 border-green-500' : 'bg-gray-50'}">
              <span class="font-mono text-sm text-gray-500 w-6">${String.fromCharCode(65 + i)}.</span>
              <span class="flex-1">${choice.answer}</span>
              ${isCorrect ? '<i class="fas fa-check-circle text-green-600 text-xl"></i>' : ''}
            </div>
          `;
        }).join('');

        qDiv.innerHTML = `
          <div class="flex items-start gap-4">
            <div class="bg-purple-100 text-purple-700 font-bold w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0">
              ${index + 1}
            </div>
            <div class="flex-1">
              <p class="text-xl font-semibold text-gray-800 mb-4">${q.question}</p>
              <div class="grid gap-3">
                ${optionsHTML}
              </div>
            </div>
          </div>
        `;
        questionsContainer.appendChild(qDiv);
      });
    }

    function showError(msg) {
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('errorMsg').textContent = msg;
    }

    // Enter key support
    document.getElementById('quizId').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') fetchKahoot();
    });
  </script>
</body>
</html>
