<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XP in Browser 🌈</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        background: #222;
        font-family: 'Roboto', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    #xp-container {
        position: relative;
    }
    canvas {
        border: 2px solid #555;
        width: 1024px;
        height: 768px;
        background: #000;
        display: block;
    }
    /* Material 3 style start button */
    #start-button {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: #6200EE;
        color: white;
        font-weight: 500;
        padding: 12px 20px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        transition: all 0.2s ease;
    }
    #start-button:hover {
        background: #3700B3;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
</style>
</head>
<body>

<div id="xp-container">
    <canvas id="screen"></canvas>
    <button id="start-button">Start</button>
</div>

<script src="https://copy.sh/v86/build/v86.js"></script>
<script>
    let emulator = null;

    const startButton = document.getElementById("start-button");
    const canvas = document.getElementById("screen");

    function bootEmulator() {
        if (emulator) {
            console.log("Emulator already running!");
            return;
        }

        emulator = new V86Starter({
            wasm_path: "https://copy.sh/v86/build/v86.wasm",
            memory_size: 512 * 1024 * 1024, // 512MB RAM
            vga_memory_size: 8 * 1024 * 1024,
            screen_container: canvas,
            bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
            vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },
            hda: { url: "YOUR_XP_IMAGE_URL_HERE" }, // <-- put your hosted XP disk image link
            autostart: true
        });

        emulator.add_listener("emulator-ready", () => {
            console.log("XP Emulator ready!");
        });
    }

    // Start button powers on the emulator
    startButton.addEventListener("click", bootEmulator);

    // Click canvas to capture keyboard/mouse input
    canvas.addEventListener("click", () => {
        canvas.focus();
    });
</script>

</body>
</html>
