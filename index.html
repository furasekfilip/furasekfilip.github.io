<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldSrc Game – Xash3D Web (Hosted files.data)</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #eee;
    }
    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #ui {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 20px;
      background: rgba(0,0,0,0.6);
      z-index: 10;
      pointer-events: none;
      user-select: none;
      font-size: 1.1rem;
      text-shadow: 1px 1px 3px #000;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      font-size: 2rem;
      z-index: 20;
    }
    #error {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #300;
      font-size: 1.6rem;
      color: #ff6666;
      z-index: 20;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="ui">
  GoldSrc via Xash3D • Press ESC to release mouse • WASD + mouse to play
</div>

<div id="loading">
  <div>Loading engine & game data…</div>
  <div style="margin-top:20px; font-size:1.1rem; opacity:0.8;">
    First load can take 30–180 seconds depending on connection
  </div>
</div>

<div id="error">
  <div style="font-size:2.2rem; margin-bottom:20px;">Something went wrong</div>
  <div id="errorMsg"></div>
</div>

<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

<script>
// =======================================================
//   CHANGE ONLY THESE TWO LINES WITH YOUR OWN LINKS
// =======================================================
const GAME_DATA_URL = "https://files.catbox.moe/yourfiles.data";     // ← your hosted .data file
const GAME_PRELOAD_JS = "https://files.catbox.moe/yourpreload.js";   // ← if you have a custom .js, otherwise leave as fallback

// Fallback to public preloader if you don't have custom .js
const FALLBACK_PRELOAD = "https://x8bitrain.github.io/webXash/xash3d.js";

// Engine configuration
window.Module = {
  canvas: document.getElementById('canvas'),
  print:   txt => console.log("[Xash3D]", txt),
  printErr: txt => console.error("[Xash3D Error]", txt),

  preRun:   [],
  postRun:  [() => document.getElementById('loading').style.display = 'none'],

  // Tell Emscripten to load your .data file from URL
  locateFile: function(path, scriptDirectory) {
    if (path.endsWith('.data')) return GAME_DATA_URL;
    return scriptDirectory + path;
  },

  // Optional: arguments passed to engine
  arguments: [
    // "-dev", "1",               // developer mode
    // "+map", "de_dust2",        // start map (if you want auto-load)
    // "+sv_cheats", "1"
  ]
};

// Show loading
const loading = document.getElementById('loading');
const errorDiv = document.getElementById('error');
const errorMsg = document.getElementById('errorMsg');

// Load the preloader script
const preloadSrc = GAME_PRELOAD_JS || FALLBACK_PRELOAD;

const script = document.createElement('script');
script.src = preloadSrc;
script.async = true;

script.onload = () => {
  loading.innerHTML = "Engine loaded… downloading game data…<br>(this can take a while)";
};

script.onerror = (e) => {
  loading.style.display = 'none';
  errorDiv.style.display = 'flex';
  errorMsg.innerHTML = `
    Failed to load Xash3D engine.<br><br>
    <small>Check console (F12) for details.<br>
    Make sure your .js / .data links are correct and publicly accessible.</small>
  `;
  console.error("Preload script failed:", e);
};

document.body.appendChild(script);
</script>
</body>
</html>
